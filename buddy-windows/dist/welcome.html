<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Caveat:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #FFF8F0;
      color: #4A3728;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .welcome {
      text-align: center;
      padding: 32px 28px;
      max-width: 280px;
    }
    .owl-img { margin-bottom: 16px; }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #5C4033;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #8B7B6E;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .speech-bubble {
      font-family: 'Caveat', cursive;
      font-size: 16px;
      color: #8B6F5E;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 2px solid #FFE8D6;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      text-align: center;
      color: #4A3728;
      background: white;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #E8985E; }
    input::placeholder { color: #C4B0A0; }
    .btn {
      margin-top: 16px;
      padding: 10px 32px;
      border-radius: 100px;
      background: #E8985E;
      color: white;
      border: none;
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(232, 152, 94, 0.3);
    }
    .btn:hover {
      background: #D4824A;
      transform: translateY(-1px);
    }
    .skip {
      margin-top: 10px;
      font-size: 12px;
      color: #8B7B6E;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
    }
    .skip:hover { color: #5C4033; }
  </style>
  <script type="module" crossorigin src="/assets/welcome-DJs8XbC3.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/window-BhI5XSUd.js">
  <link rel="modulepreload" crossorigin href="/assets/webviewWindow-BuKxp_t6.js">
</head>
<body>
  <div class="welcome">
    <img src="/owls/owl_active_open.png" width="100" height="100" class="owl-img">
    <h1>Welcome to Buddy!</h1>
    <p class="speech-bubble">hoo hoo! :)</p>
    <p class="subtitle">What should your friends see you as?<br>This name appears under your owl on their desktop.</p>
    <input id="name-input" type="text" placeholder="Your name" autofocus>
    <br>
    <button class="btn" id="save-btn">Let's go!</button>
    <br>
    <button class="skip" id="skip-btn">Skip for now</button>
  </div>

</body>
</html>
